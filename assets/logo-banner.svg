<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bBgGlow" cx="22%" cy="30%" r="95%">
      <stop offset="0%" stop-color="#2a140a"/>
      <stop offset="45%" stop-color="#140b09"/>
      <stop offset="100%" stop-color="#070504"/>
    </radialGradient>

    <linearGradient id="bPanelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </linearGradient>

    <linearGradient id="bPanelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb37a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ff7a4d" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff4d4d" stop-opacity="0.35"/>
    </linearGradient>

    <linearGradient id="bEmberArc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="50%" stop-color="#ff8c3b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <linearGradient id="bEmberText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="55%" stop-color="#ff8c3b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <radialGradient id="bCoreGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#fff6e6"/>
      <stop offset="30%" stop-color="#ffd166"/>
      <stop offset="65%" stop-color="#ff8c3b"/>
      <stop offset="100%" stop-color="#e63946"/>
    </radialGradient>

    <radialGradient id="bNodeGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="55%" stop-color="#ffb066"/>
      <stop offset="100%" stop-color="#ef5b3f"/>
    </radialGradient>

    <filter id="bSoftBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="bStrongBlur" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="bTinyBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>

    <clipPath id="bPanelClip">
      <rect x="6" y="6" width="788" height="188" rx="34"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="800" height="200" rx="38" fill="url(#bBgGlow)"/>

  <g clip-path="url(#bPanelClip)">
    <!-- ambient color blooms -->
    <circle cx="90" cy="170" r="110" fill="#ef4444" opacity="0.16" filter="url(#bStrongBlur)"/>
    <circle cx="130" cy="20" r="100" fill="#ff8c3b" opacity="0.20" filter="url(#bStrongBlur)"/>
    <circle cx="720" cy="170" r="140" fill="#ffb066" opacity="0.10" filter="url(#bStrongBlur)"/>

    <!-- faint decorative swarm mesh on the right -->
    <g stroke="url(#bEmberArc)" stroke-width="1" opacity="0.16">
      <line x1="560" y1="40" x2="620" y2="75"/>
      <line x1="620" y1="75" x2="600" y2="130"/>
      <line x1="600" y1="130" x2="670" y2="150"/>
      <line x1="670" y1="150" x2="730" y2="110"/>
      <line x1="620" y1="75" x2="700" y2="55"/>
      <line x1="700" y1="55" x2="730" y2="110"/>
      <line x1="600" y1="130" x2="540" y2="150"/>
      <line x1="670" y1="150" x2="720" y2="175"/>
    </g>
    <g fill="url(#bNodeGrad)" opacity="0.55">
      <circle cx="560" cy="40" r="3"/>
      <circle cx="620" cy="75" r="3.4"/>
      <circle cx="600" cy="130" r="3"/>
      <circle cx="670" cy="150" r="3.4"/>
      <circle cx="730" cy="110" r="3"/>
      <circle cx="700" cy="55" r="2.6"/>
      <circle cx="540" cy="150" r="2.6"/>
      <circle cx="720" cy="175" r="2.6"/>
    </g>

    <!-- ===== icon, scaled from the 240x240 icon artwork ===== -->
    <g transform="translate(26,20) scale(0.65)">
      <g stroke-linecap="round" opacity="0.55">
        <line x1="120" y1="120" x2="120" y2="43" stroke="url(#bEmberArc)" stroke-width="2"/>
        <line x1="120" y1="120" x2="187" y2="81" stroke="url(#bEmberArc)" stroke-width="2"/>
        <line x1="120" y1="120" x2="187" y2="159" stroke="url(#bEmberArc)" stroke-width="2"/>
        <line x1="120" y1="120" x2="120" y2="197" stroke="url(#bEmberArc)" stroke-width="2"/>
        <line x1="120" y1="120" x2="53" y2="159" stroke="url(#bEmberArc)" stroke-width="2"/>
        <line x1="120" y1="120" x2="53" y2="81" stroke="url(#bEmberArc)" stroke-width="2"/>
      </g>

      <path d="M 120 38 A 82 82 0 1 1 45.5 96" fill="none" stroke="url(#bEmberArc)" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>
      <path d="M 36 80 L 45.5 96 L 62 90.5" fill="none" stroke="url(#bEmberArc)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

      <g>
        <circle cx="120" cy="43" r="10.5" fill="url(#bNodeGrad)" opacity="0.35" filter="url(#bSoftBlur)"/>
        <circle cx="120" cy="43" r="7.5" fill="url(#bNodeGrad)"/>
        <circle cx="187" cy="81" r="10.5" fill="url(#bNodeGrad)" opacity="0.35" filter="url(#bSoftBlur)"/>
        <circle cx="187" cy="81" r="7.5" fill="url(#bNodeGrad)"/>
        <circle cx="187" cy="159" r="10.5" fill="url(#bNodeGrad)" opacity="0.35" filter="url(#bSoftBlur)"/>
        <circle cx="187" cy="159" r="7.5" fill="url(#bNodeGrad)"/>
        <circle cx="120" cy="197" r="10.5" fill="url(#bNodeGrad)" opacity="0.35" filter="url(#bSoftBlur)"/>
        <circle cx="120" cy="197" r="7.5" fill="url(#bNodeGrad)"/>
        <circle cx="53" cy="159" r="10.5" fill="url(#bNodeGrad)" opacity="0.35" filter="url(#bSoftBlur)"/>
        <circle cx="53" cy="159" r="7.5" fill="url(#bNodeGrad)"/>
        <circle cx="53" cy="81" r="10.5" fill="url(#bNodeGrad)" opacity="0.35" filter="url(#bSoftBlur)"/>
        <circle cx="53" cy="81" r="7.5" fill="url(#bNodeGrad)"/>
      </g>

      <circle cx="120" cy="120" r="34" fill="#ff8c3b" opacity="0.34" filter="url(#bStrongBlur)"/>
      <circle cx="120" cy="120" r="23" fill="url(#bCoreGrad)"/>
      <circle cx="120" cy="120" r="23" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.2"/>
      <circle cx="113" cy="112" r="6" fill="#ffffff" opacity="0.6" filter="url(#bTinyBlur)"/>
    </g>

    <!-- glass sheen -->
    <ellipse cx="120" cy="10" rx="260" ry="60" fill="#ffffff" opacity="0.04"/>
  </g>

  <!-- wordmark: single text run with tspans so widths always flow correctly, never overlap -->
  <text x="222" y="103" font-family="'Trebuchet MS', 'DejaVu Sans Condensed', Verdana, sans-serif" font-weight="bold" font-size="44" letter-spacing="0.5"><tspan fill="#f5f1ea">ELYSIUM </tspan><tspan fill="url(#bEmberText)">SWARMLOOP</tspan></text>

  <text x="223" y="132" font-family="'Trebuchet MS', 'DejaVu Sans Condensed', Verdana, sans-serif" font-weight="bold" font-size="14" letter-spacing="2.6" fill="#b79a8a">SELF-IMPROVING MULTI-AGENT ORCHESTRATION ENGINE</text>

  <text x="223" y="160" font-family="'Trebuchet MS', 'DejaVu Sans Condensed', Verdana, sans-serif" font-style="italic" font-size="14.5" letter-spacing="0.5" fill="#ff9a5a" opacity="0.85">Towards Agentic Utopia.</text>

  <!-- divider -->
  <rect x="223" y="112" width="380" height="1" fill="url(#bEmberArc)" opacity="0.28"/>

  <!-- glass panel fill + border -->
  <rect x="6" y="6" width="788" height="188" rx="34" fill="url(#bPanelFill)"/>
  <rect x="6.75" y="6.75" width="786.5" height="186.5" rx="33.25" fill="none" stroke="url(#bPanelStroke)" stroke-width="1.5"/>
</svg>
