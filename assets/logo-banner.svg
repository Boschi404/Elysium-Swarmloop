<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Gold gradient primary -->
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d860"/>
      <stop offset="35%" style="stop-color:#d4a017"/>
      <stop offset="70%" style="stop-color:#f0d860"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <!-- Gold gradient secondary -->
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a017"/>
      <stop offset="50%" style="stop-color:#f5e080"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <!-- Gold shine / reflection -->
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5cc; stop-opacity:0.6"/>
      <stop offset="30%" style="stop-color:#f5e080; stop-opacity:0.3"/>
      <stop offset="60%" style="stop-color:#d4a017; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#8b6914; stop-opacity:0.2"/>
    </linearGradient>
    <!-- Dark gold for accents -->
    <linearGradient id="goldDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="50%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="reflection">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.6" specularExponent="15" result="spec">
        <fePointLight x="200" y="50" z="200"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceGraphic" operator="in" result="reflect"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="reflect"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background - ultra dark -->
  <rect width="800" height="200" rx="16" fill="#080c14"/>
  <rect width="800" height="200" rx="16" fill="url(#goldShine)" opacity="0.03"/>
  
  <!-- Border glow -->
  <rect x="1" y="1" width="798" height="198" rx="15" fill="none" stroke="#d4a017" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Grid dots - gold tinted -->
  <g fill="#d4a017" opacity="0.12">
    <circle cx="20" cy="20" r="1.5"/><circle cx="60" cy="20" r="1.5"/><circle cx="100" cy="20" r="1.5"/>
    <circle cx="140" cy="20" r="1.5"/><circle cx="180" cy="20" r="1.5"/><circle cx="220" cy="20" r="1.5"/>
    <circle cx="260" cy="20" r="1.5"/><circle cx="300" cy="20" r="1.5"/><circle cx="340" cy="20" r="1.5"/>
    <circle cx="380" cy="20" r="1.5"/><circle cx="420" cy="20" r="1.5"/><circle cx="460" cy="20" r="1.5"/>
    <circle cx="500" cy="20" r="1.5"/><circle cx="540" cy="20" r="1.5"/><circle cx="580" cy="20" r="1.5"/>
    <circle cx="620" cy="20" r="1.5"/><circle cx="660" cy="20" r="1.5"/><circle cx="700" cy="20" r="1.5"/>
    <circle cx="740" cy="20" r="1.5"/><circle cx="780" cy="20" r="1.5"/>
    <circle cx="20" cy="60" r="1.5"/><circle cx="20" cy="100" r="1.5"/><circle cx="20" cy="140" r="1.5"/>
    <circle cx="20" cy="180" r="1.5"/><circle cx="780" cy="60" r="1.5"/><circle cx="780" cy="100" r="1.5"/>
    <circle cx="780" cy="140" r="1.5"/><circle cx="780" cy="180" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/><circle cx="100" cy="180" r="1.5"/><circle cx="140" cy="180" r="1.5"/>
    <circle cx="180" cy="180" r="1.5"/><circle cx="220" cy="180" r="1.5"/><circle cx="260" cy="180" r="1.5"/>
    <circle cx="300" cy="180" r="1.5"/><circle cx="340" cy="180" r="1.5"/><circle cx="380" cy="180" r="1.5"/>
    <circle cx="420" cy="180" r="1.5"/><circle cx="460" cy="180" r="1.5"/><circle cx="500" cy="180" r="1.5"/>
    <circle cx="540" cy="180" r="1.5"/><circle cx="580" cy="180" r="1.5"/><circle cx="620" cy="180" r="1.5"/>
    <circle cx="660" cy="180" r="1.5"/><circle cx="700" cy="180" r="1.5"/><circle cx="740" cy="180" r="1.5"/>
  </g>
  
  <!-- Constellation - upper gold -->
  <g filter="url(#glowSoft)">
    <circle cx="60" cy="70" r="4" fill="#f0d860" opacity="0.5"/>
    <circle cx="105" cy="55" r="5" fill="#ffd700" opacity="0.7"/>
    <circle cx="150" cy="48" r="3" fill="#d4a017" opacity="0.4"/>
    <circle cx="195" cy="60" r="6" fill="#f5e080" opacity="0.8"/>
    <circle cx="230" cy="80" r="4" fill="#ffd700" opacity="0.6"/>
  </g>
  <!-- Constellation - lower gold -->
  <g filter="url(#glowSoft)">
    <circle cx="60" cy="130" r="4" fill="#d4a017" opacity="0.5"/>
    <circle cx="105" cy="145" r="5" fill="#f0d860" opacity="0.7"/>
    <circle cx="150" cy="152" r="3" fill="#b8860b" opacity="0.4"/>
    <circle cx="195" cy="140" r="6" fill="#ffd700" opacity="0.8"/>
    <circle cx="230" cy="120" r="4" fill="#f5e080" opacity="0.6"/>
  </g>
  
  <!-- Constellation lines -->
  <g stroke="#d4a017" stroke-width="0.8" opacity="0.25">
    <line x1="60" y1="70" x2="105" y2="55"/>
    <line x1="105" y1="55" x2="150" y2="48"/>
    <line x1="150" y1="48" x2="195" y2="60"/>
    <line x1="195" y1="60" x2="230" y2="80"/>
    <line x1="60" y1="130" x2="105" y2="145"/>
    <line x1="105" y1="145" x2="150" y2="152"/>
    <line x1="150" y1="152" x2="195" y2="140"/>
    <line x1="195" y1="140" x2="230" y2="120"/>
    <line x1="60" y1="70" x2="105" y2="145" opacity="0.15"/>
    <line x1="195" y1="60" x2="150" y2="152" opacity="0.15"/>
  </g>
  
  <!-- Central infinity/loop symbol - gold -->
  <g transform="translate(400, 100)" filter="url(#glow)">
    <path d="M -30,-25 C -15,-40 15,-40 30,-25 C 45,-10 30,10 15,15 C 0,20 -15,15 -25,5 C -35,-5 -45,10 -30,25 C -15,40 15,40 30,25"
          fill="none" stroke="url(#gold1)" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
    <polygon points="28,22 35,25 30,30" fill="url(#gold2)"/>
  </g>
  
  <!-- Orbiting particles -->
  <g filter="url(#glowSoft)">
    <circle cx="370" cy="65" r="2.5" fill="#f0d860" opacity="0.6"/>
    <circle cx="430" cy="65" r="2" fill="#ffd700" opacity="0.5"/>
    <circle cx="365" cy="130" r="2" fill="#d4a017" opacity="0.5"/>
    <circle cx="435" cy="135" r="2.5" fill="#f5e080" opacity="0.6"/>
    <circle cx="355" cy="95" r="1.5" fill="#b8860b" opacity="0.3"/>
    <circle cx="445" cy="100" r="1.5" fill="#ffd700" opacity="0.3"/>
  </g>
  
  <!-- Title text -->
  <text x="530" y="85" fill="#f5e080" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="700" filter="url(#glowSoft)">ELYSIUM</text>
  <text x="530" y="115" fill="url(#gold2)" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="600" filter="url(#glowSoft)">SWARMLOOP</text>
  <text x="530" y="140" fill="#d4a017" font-family="'Inter', sans-serif" font-size="11" opacity="0.6">The Self-Improving</text>
  <text x="530" y="155" fill="#d4a017" font-family="'Inter', sans-serif" font-size="11" opacity="0.6">Multi-Agent Orchestration Engine</text>
  
  <!-- Version badge - gold -->
  <rect x="530" y="165" width="70" height="18" rx="4" fill="#1a1200" stroke="#d4a017" stroke-width="1"/>
  <rect x="530" y="165" width="70" height="18" rx="4" fill="url(#goldShine)" opacity="0.08"/>
  <text x="565" y="178" text-anchor="middle" fill="#f0d860" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600">v0.6</text>
  
  <!-- Gold reflection streaks top-left -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="150" y2="50" stroke="#fff5cc" stroke-width="2"/>
    <line x1="0" y1="0" x2="100" y2="80" stroke="#fff5cc" stroke-width="1"/>
    <line x1="0" y1="0" x2="200" y2="30" stroke="#fff5cc" stroke-width="0.5"/>
  </g>
</svg>
