<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2a140a"/>
      <stop offset="45%" stop-color="#140b09"/>
      <stop offset="100%" stop-color="#070504"/>
    </radialGradient>

    <linearGradient id="panelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </linearGradient>

    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb37a" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ff7a4d" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff4d4d" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="emberArc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="50%" stop-color="#ff8c3b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <radialGradient id="coreGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#fff6e6"/>
      <stop offset="30%" stop-color="#ffd166"/>
      <stop offset="65%" stop-color="#ff8c3b"/>
      <stop offset="100%" stop-color="#e63946"/>
    </radialGradient>

    <radialGradient id="nodeGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="55%" stop-color="#ffb066"/>
      <stop offset="100%" stop-color="#ef5b3f"/>
    </radialGradient>

    <filter id="softBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="strongBlur" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="tinyBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>

    <clipPath id="panelClip">
      <rect x="8" y="8" width="224" height="224" rx="52"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="240" height="240" rx="56" fill="url(#bgGlow)"/>

  <g clip-path="url(#panelClip)">
    <!-- ambient color blooms behind glass -->
    <circle cx="70" cy="190" r="70" fill="#ef4444" opacity="0.20" filter="url(#strongBlur)"/>
    <circle cx="185" cy="55" r="65" fill="#ff8c3b" opacity="0.22" filter="url(#strongBlur)"/>

    <!-- orbit connection lines -->
    <g stroke-linecap="round" opacity="0.55">
      <line x1="120" y1="120" x2="120" y2="43" stroke="url(#emberArc)" stroke-width="1.6"/>
      <line x1="120" y1="120" x2="187" y2="81" stroke="url(#emberArc)" stroke-width="1.6"/>
      <line x1="120" y1="120" x2="187" y2="159" stroke="url(#emberArc)" stroke-width="1.6"/>
      <line x1="120" y1="120" x2="120" y2="197" stroke="url(#emberArc)" stroke-width="1.6"/>
      <line x1="120" y1="120" x2="53" y2="159" stroke="url(#emberArc)" stroke-width="1.6"/>
      <line x1="120" y1="120" x2="53" y2="81" stroke="url(#emberArc)" stroke-width="1.6"/>
    </g>

    <!-- loop arc (self-improving cycle), ~290 degrees with arrowhead -->
    <path d="M 120 38 A 82 82 0 1 1 45.5 96" fill="none" stroke="url(#emberArc)" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
    <!-- arrowhead at loop end -->
    <path d="M 36 80 L 45.5 96 L 62 90.5" fill="none" stroke="url(#emberArc)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- leaf nodes -->
    <g>
      <circle cx="120" cy="43" r="10.5" fill="url(#nodeGrad)" opacity="0.35" filter="url(#softBlur)"/>
      <circle cx="120" cy="43" r="7.5" fill="url(#nodeGrad)"/>

      <circle cx="187" cy="81" r="10.5" fill="url(#nodeGrad)" opacity="0.35" filter="url(#softBlur)"/>
      <circle cx="187" cy="81" r="7.5" fill="url(#nodeGrad)"/>

      <circle cx="187" cy="159" r="10.5" fill="url(#nodeGrad)" opacity="0.35" filter="url(#softBlur)"/>
      <circle cx="187" cy="159" r="7.5" fill="url(#nodeGrad)"/>

      <circle cx="120" cy="197" r="10.5" fill="url(#nodeGrad)" opacity="0.35" filter="url(#softBlur)"/>
      <circle cx="120" cy="197" r="7.5" fill="url(#nodeGrad)"/>

      <circle cx="53" cy="159" r="10.5" fill="url(#nodeGrad)" opacity="0.35" filter="url(#softBlur)"/>
      <circle cx="53" cy="159" r="7.5" fill="url(#nodeGrad)"/>

      <circle cx="53" cy="81" r="10.5" fill="url(#nodeGrad)" opacity="0.35" filter="url(#softBlur)"/>
      <circle cx="53" cy="81" r="7.5" fill="url(#nodeGrad)"/>
    </g>

    <!-- core orchestrator node -->
    <circle cx="120" cy="120" r="32" fill="#ff8c3b" opacity="0.32" filter="url(#strongBlur)"/>
    <circle cx="120" cy="120" r="23" fill="url(#coreGrad)"/>
    <circle cx="120" cy="120" r="23" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="113" cy="112" r="6" fill="#ffffff" opacity="0.6" filter="url(#tinyBlur)"/>

    <!-- glass sheen -->
    <ellipse cx="70" cy="40" rx="120" ry="55" fill="#ffffff" opacity="0.05"/>
  </g>

  <!-- glass panel fill + border on top -->
  <rect x="8" y="8" width="224" height="224" rx="52" fill="url(#panelFill)"/>
  <rect x="8.75" y="8.75" width="222.5" height="222.5" rx="51.25" fill="none" stroke="url(#panelStroke)" stroke-width="1.5"/>
</svg>
