<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Gold gradient primary -->
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d860"/>
      <stop offset="35%" style="stop-color:#d4a017"/>
      <stop offset="70%" style="stop-color:#f5e080"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <!-- Gold shine / reflection overlay -->
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5cc; stop-opacity:0.5"/>
      <stop offset="25%" style="stop-color:#f5e080; stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#d4a017; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#8b6914; stop-opacity:0.15"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background - ultra dark with rounded corners -->
  <rect width="120" height="120" rx="24" fill="#080c14"/>
  <rect width="120" height="120" rx="24" fill="url(#goldShine)" opacity="0.04"/>
  
  <!-- Subtle gold border -->
  <rect x="1" y="1" width="118" height="118" rx="23" fill="none" stroke="#d4a017" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Constellation top - gold -->
  <g filter="url(#glowSoft)">
    <circle cx="25" cy="40" r="3" fill="#f0d860" opacity="0.5"/>
    <circle cx="42" cy="30" r="4" fill="#ffd700" opacity="0.7"/>
    <circle cx="60" cy="28" r="2.5" fill="#d4a017" opacity="0.4"/>
    <circle cx="78" cy="35" r="4.5" fill="#f5e080" opacity="0.8"/>
    <circle cx="90" cy="50" r="3" fill="#ffd700" opacity="0.6"/>
  </g>
  <!-- Constellation bottom - gold -->
  <g filter="url(#glowSoft)">
    <circle cx="25" cy="80" r="3" fill="#d4a017" opacity="0.5"/>
    <circle cx="42" cy="90" r="4" fill="#f0d860" opacity="0.7"/>
    <circle cx="60" cy="92" r="2.5" fill="#b8860b" opacity="0.4"/>
    <circle cx="78" cy="85" r="4.5" fill="#ffd700" opacity="0.8"/>
    <circle cx="90" cy="70" r="3" fill="#f5e080" opacity="0.6"/>
  </g>
  
  <!-- Constellation lines -->
  <g stroke="#d4a017" stroke-width="0.6" opacity="0.2">
    <line x1="25" y1="40" x2="42" y2="30"/>
    <line x1="42" y1="30" x2="60" y2="28"/>
    <line x1="60" y1="28" x2="78" y2="35"/>
    <line x1="78" y1="35" x2="90" y2="50"/>
    <line x1="25" y1="80" x2="42" y2="90"/>
    <line x1="42" y1="90" x2="60" y2="92"/>
    <line x1="60" y1="92" x2="78" y2="85"/>
    <line x1="78" y1="85" x2="90" y2="70"/>
  </g>
  
  <!-- Central infinity/loop symbol - gold -->
  <g transform="translate(60, 60)" filter="url(#glow)">
    <path d="M -18,-15 C -9,-24 9,-24 18,-15 C 27,-6 18,6 9,9 C 0,12 -9,9 -15,3 C -21,-3 -27,6 -18,15 C -9,24 9,24 18,15"
          fill="none" stroke="url(#gold1)" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  </g>
  
  <!-- Version text -->
  <text x="60" y="112" text-anchor="middle" fill="#d4a017" font-family="'JetBrains Mono', monospace" font-size="7" opacity="0.6" font-weight="600">v0.6</text>
</svg>
