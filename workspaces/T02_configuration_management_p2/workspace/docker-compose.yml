# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — FastAPI + PostgreSQL + Redis + Nginx + Certbot
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi-app:latest
    container_name: fastapi-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENVIRONMENT=production
      - APP_DEBUG=false
    expose:
      - "8000"
    networks:
      frontend:
        aliases:
          - app
      backend:
        aliases:
          - app
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-40s}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fastapi-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-fastapi_app}
      - POSTGRES_USER=${POSTGRES_USER:-app_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD}
    expose:
      - "5432"
    networks:
      backend:
        aliases:
          - db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-fastapi_app}"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-40s}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fastapi-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD:?Please set REDIS_PASSWORD}
      - --appendonly yes
      - --appendfsync everysec
      - --save 900 1
      - --save 300 10
      - --save 60 10000
    expose:
      - "6379"
    networks:
      backend:
        aliases:
          - redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "__healthcheck_ping"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-40s}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fastapi-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    networks:
      frontend:
        aliases:
          - nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-40s}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot (SSL renewal) ───────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: fastapi-certbot
    restart: "no"
    env_file:
      - .env
    networks:
      frontend:
        aliases:
          - certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    profiles:
      - certbot
    entrypoint: >
      sh -c "
        echo '### Requesting initial certificate …';
        certbot certonly --webroot \
          --webroot-path /var/www/certbot \
          --email $$CERTBOT_EMAIL \
          --domains $$CERTBOT_DOMAIN \
          --rsa-key-size $$CERTBOT_RSA_KEY_SIZE \
          --agree-tos \
          --non-interactive \
          $$([ \"$$CERTBOT_STAGING\" = \"true\" ] && echo '--staging') \
          --force-renewal
      "

  # ── Certbot renew (scheduled via systemd/cron, not a long-running service) ─
  certbot-renew:
    image: certbot/certbot:latest
    container_name: fastapi-certbot-renew
    restart: "no"
    profiles:
      - certbot
    networks:
      frontend: null
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -c "
        echo '### Renewing certificates …';
        certbot renew --non-interactive --quiet
      "

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    name: fastapi_postgres_data
  redis_data:
    driver: local
    name: fastapi_redis_data
  static_volume:
    driver: local
    name: fastapi_static
  media_volume:
    driver: local
    name: fastapi_media
  certbot_conf:
    driver: local
    name: fastapi_certbot_conf
  certbot_www:
    driver: local
    name: fastapi_certbot_www

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  frontend:
    name: fastapi_frontend
    driver: bridge
    ipam:
      config:
        - subnet: "172.20.0.0/24"
  backend:
    name: fastapi_backend
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: "172.21.0.0/24"
