# ──────────────────────────────────────────────────────────────────────────────
# nginx.conf — reverse proxy for FastAPI, static/media serving, SSL termination
# ──────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Basic settings ────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main buffer=32k;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ── Rate limiting (global) ────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m  rate=30r/s;
    limit_conn_zone $binary_remote_addr  zone=addr:10m;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream: FastAPI app ─────────────────────────────────────────────────
    upstream fastapi_backend {
        least_conn;
        server app:8000 max_fails=5 fail_timeout=30s;
    }

    # ── Server: HTTP → HTTPS redirect (Certbot) ──────────────────────────────
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }

        # Well-known path for Certbot ACME challenge
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }

        location = /.well-known/acme-challenge/ {
            return 404;
        }
    }

    # ── Server: HTTPS (SSL termination) ───────────────────────────────────────
    server {
        listen      443 ssl http2 default_server;
        listen      [::]:443 ssl http2 default_server;
        server_name _;

        # SSL certificate (mounted from certbot)
        ssl_certificate     /etc/letsencrypt/live/${NGINX_HOST:-localhost}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${NGINX_HOST:-localhost}/privkey.pem;

        # Modern TLS configuration
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;
        ssl_session_tickets       off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ── API proxy ──────────────────────────────────────────────────────────
        location / {
            # Rate limiting per client
            limit_req  zone=api burst=20 nodelay;
            limit_conn addr 10;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;

            proxy_redirect off;

            proxy_read_timeout     ${NGINX_PROXY_READ_TIMEOUT:-120s};
            proxy_connect_timeout  ${NGINX_PROXY_CONNECT_TIMEOUT:-30s};
            proxy_send_timeout     60s;

            # Buffering
            proxy_buffering        on;
            proxy_buffer_size      8k;
            proxy_buffers          8 32k;
            proxy_busy_buffers_size 64k;

            # WebSocket support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Static files ───────────────────────────────────────────────────────
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Media files ────────────────────────────────────────────────────────
        location /media/ {
            alias /var/www/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── Deny access to hidden files ────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Error pages ────────────────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
